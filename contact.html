<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="description" content="Contact Me page">
    <title>Contact Me</title>
</head>
<body>

<header>
    <h1>Contact Me</h1>
</header>

<main>

    <section>
        <nav>
            <ul>
                <li><a href="index.html"> Home</a></li>
                <li><a href="about.html">👩‍💻 About Me</a></li>
                <li><a href="academic.html">🎓 My Academic Record</a></li>
                <li><a href="projects.html">💼 My Projects</a></li>
                <li><a href="skills.html">🛠 My Skills</a></li>
                <li><a href="contact.html" class="active">✉️ Contact me</a></li>
            </ul>
        </nav>
    </section>

    <section>
        <form action="#" method="post">

            <fieldset>
                <legend>Personal Information</legend>

                <label for="fullname">Full Name:</label><br>
                <input type="text" id="fullname" name="fullname"><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" placeholder="example@gmail.com"><br><br>

                <label for="phone">Phone Number:</label><br>
                <input type="tel" id="phone" name="phone"><br><br>

                <label for="age">Age:</label><br>
                <input type="number" id="age" name="age"
                    min="10" max="100"><br><br>

                <label for="date">Preferred Contact Date:</label><br>
                <input type="date" id="date" name="date"><br><br>

            </fieldset>

            <fieldset>
                <legend>Message Details</legend>

                <label for="subject">Subject:</label><br>
                <select id="subject" name="subject">
                    <optgroup label="Academic">
                        <option>Assignment Discussion</option>
                        <option>Study Help</option>
                        <option>Group Project</option>
                    </optgroup>
                    <optgroup label="Oppotunities">
                        <option>Internship Inquiry</option>
                        <option>Collaboration</option>
                    </optgroup>
                    <optgroup label="General">
                        <option>Feedback</option>
                        <option>Others</option>
                    </optgroup>
                </select><br><br>

                <label>Services Interested In:</label><br>
                <input type="checkbox" id="web" name="service" value="web">
                <label for="web">Web Development</label><br>

                <input type="checkbox" id="design" name="service" value="design">
                <label for="design">UI Design</label><br>

                <input type="checkbox" id="app" name="service" value="app">
                <label for="app">App Development</label><br><br>

                <label>Preferred Contact Method:</label><br>
                <input type="radio" id="email_contact" name="contact_method" value="email">
                <label for="email_contact">Email</label><br>

                <input type="radio" id="phone_contact" name="contact_method" value="phone">
                <label for="phone_contact">Phone</label><br>

                <input type="radio" id="whatsapp_contact" name="contact_method" value="whatsapp">
                <label for="whatsapp_contact">WhatsApp</label><br><br>

                <label for="range">How urgent is your message?</label><br>
                <input type="range" id="range" name="urgency" min="1" max="10"><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message"
                    rows="4" cols="40"
                    placeholder="Write your message here..."
                    required maxlength="200"></textarea><br><br>

                <button type="submit">
                    Send Message
                </button>

            </fieldset>

        </form>
    </section>
</main>

<footer>
    <small>&copy; 2026 Auni Nurin Hidayah. All rights reserved.</small>
</footer>

</body>
</html>
